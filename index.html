<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-OMR | 純前端 Canvas 智慧自動答案卡批改系統</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="brand">
                <span class="logo-icon">🚀</span>
                <div>
                    <h1>自動答案卡批改系統</h1>
                    <p class="subtitle">智慧直方圖邊界自動偵測引擎 (上傳自動對齊・完美部署 GitHub Pages)</p>
                </div>
            </div>
            <button id="btn-full-reset" class="btn btn-danger">✕ 完全重設系統</button>
        </header>
        
        <main class="main-container">
            <section class="panel-card student-panel">
                <div class="panel-header">
                    <h2>🧑‍🎓 學生答案卡批改區</h2>
                </div>
                
                <div class="workspace">
                    <div class="upload-container" id="student-drop-zone">
                        <input type="file" id="upload-student" accept="image/*" capture="environment">
                        <label for="upload-student" class="drop-wrapper">
                            <span class="cloud-icon">📸</span>
                            <span class="upload-text">點擊或拍照上傳學生卡 (自動對齊)</span>
                        </label>
                        <canvas id="canvas-student" class="hidden"></canvas>
                    </div>

                    <div id="result-panel" class="result-dashboard hidden">
                        <div class="metrics-grid">
                            <div class="metric-item score-card">
                                <span class="metric-label">最終得分</span>
                                <div class="metric-value"><span id="score-text">0</span><span class="unit">分</span></div>
                            </div>
                            <div class="metric-item wrong-card">
                                <span class="metric-label">錯題總數</span>
                                <div class="metric-value" id="wrong-count">0</div>
                            </div>
                        </div>
                        
                        <div class="wrong-details-container">
                            <h3>❌ 錯題詳情對照</h3>
                            <ul id="wrong-list" class="custom-scrollbar"></ul>
                        </div>
                        
                        <button id="btn-next-student" class="btn btn-primary">🔄 換下一張學生卡</button>
                    </div>
                </div>
            </section>

            <section class="panel-card template-panel">
                <div class="panel-header">
                    <h2>🎯 標準答案設定區 (解答本)</h2>
                    <span id="ans-status" class="badge badge-warning">⚠️ 請先設定基準</span>
                </div>
                
                <div class="workspace">
                    <div class="upload-container" id="answer-drop-zone">
                        <input type="file" id="upload-answer" accept="image/*" capture="environment">
                        <label for="upload-answer" class="drop-wrapper-ans">
                            <span class="cloud-icon">🎯</span>
                            <span class="upload-text">點擊或拍照上傳正確答案卡 (自動對齊)</span>
                        </label>
                        <canvas id="canvas-answer" class="hidden"></canvas>
                    </div>

                    <div class="controls-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="input-total-questions">總題數</label>
                                <input type="number" id="input-total-questions" value="20" min="1" max="100">
                            </div>
                            <div class="form-group">
                                <label for="input-score-per-question">每題配分</label>
                                <input type="number" id="input-score-per-question" value="5" min="0" step="0.5">
                            </div>
                        </div>

                        <div class="calibration-box">
                            <h3>🛠️ 智慧防線微調工具 (系統已自動偵測，僅供極端拍照補償使用)</h3>
                            
                            <div class="slider-grid-2col">
                                <div class="slider-group">
                                    <div class="slider-header"><span>網格左邊界 (X)</span><span class="slider-val" id="val-left">50</span></div>
                                    <input type="range" id="cali-left" min="0" max="300" value="50">
                                </div>
                                <div class="slider-group">
                                    <div class="slider-header"><span>網格寬度 (W)</span><span class="slider-val" id="val-width">600</span></div>
                                    <input type="range" id="cali-width" min="400" max="800" value="600">
                                </div>
                                <div class="slider-group">
                                    <div class="slider-header"><span>網格頂邊界 (Y)</span><span class="slider-val" id="val-top">190</span></div>
                                    <input type="range" id="cali-top" min="50" max="400" value="190">
                                </div>
                                <div class="slider-group">
                                    <div class="slider-header"><span>網格高度 (H)</span><span class="slider-val" id="val-height">830</span></div>
                                    <input type="range" id="cali-height" min="500" max="1000" value="830">
                                </div>
                            </div>

                            <div class="slider-group" style="margin-top: 10px;">
                                <div class="slider-header">
                                    <span>考卷斜角變形修正 (Skew)</span>
                                    <span class="slider-val"><span id="val-skew">0</span>px</span>
                                </div>
                                <input type="range" id="cali-skew" min="-50" max="50" value="0">
                            </div>

                            <div class="form-row" style="margin-top: 10px;">
                                <div class="form-group">
                                    <label>選項內跨距</label>
                                    <input type="number" id="cali-opt-gap" value="35.5" step="0.1">
                                </div>
                                <div class="form-group">
                                    <label>靈敏度閥值</label>
                                    <input type="number" id="cali-threshold" value="45" min="5">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
